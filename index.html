<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onelingo - AI Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f172a] text-white flex flex-col items-center min-h-screen p-4 overflow-hidden">

<div class="w-full max-w-md mt-6 flex items-center gap-4">
    <button class="text-gray-400 text-3xl hover:text-white transition-colors" onclick="location.reload()">
        <i class="fa-solid fa-xmark"></i>
    </button>
    <div class="flex-1 bg-gray-700 h-4 rounded-full overflow-hidden">
        <div id="progress" class="bg-green-500 h-full transition-all duration-700" style="width: 10%"></div>
    </div>
</div>

<main id="app" class="w-full max-w-md mt-12 flex-grow overflow-y-auto pb-32">
    <div id="challenge-container">
        <div class="flex flex-col items-center justify-center mt-20 space-y-4">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-500"></div>
            <p class="text-gray-400 font-medium">Generando reto con IA...</p>
        </div>
    </div>
</main>

<footer class="fixed bottom-0 w-full max-w-md p-6 bg-[#0f172a] border-t border-gray-800">
    <button id="action-btn" onclick="checkAnswer()" class="w-full py-4 bg-green-500 hover:bg-green-400 border-b-4 border-green-700 active:border-b-0 active:mt-1 rounded-2xl font-bold text-lg uppercase tracking-wider transition-all">
        Comprobar
    </button>
</footer>

<script src="app.js"></script>
</body>
</html>
